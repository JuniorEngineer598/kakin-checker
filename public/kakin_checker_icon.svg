<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="課金チェッカー アイコン">
  <title>課金チェッカー アイコン</title>
  <desc>白背景、濃紺の角丸フレーム、棒グラフ、黒い虫眼鏡を組み合わせたアプリアイコン。</desc>

  <defs>
    <linearGradient id="navy" x1="113" y1="80" x2="908" y2="909" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06142D"/>
      <stop offset="0.52" stop-color="#031126"/>
      <stop offset="1" stop-color="#020D23"/>
    </linearGradient>

    <linearGradient id="bar1" x1="252" y1="524" x2="394" y2="649" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9DADFF"/>
      <stop offset="1" stop-color="#7787FF"/>
    </linearGradient>

    <linearGradient id="bar2" x1="444" y1="423" x2="593" y2="649" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6879FF"/>
      <stop offset="1" stop-color="#5164F3"/>
    </linearGradient>

    <linearGradient id="bar3" x1="644" y1="313" x2="796" y2="649" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4B45F4"/>
      <stop offset="1" stop-color="#2530F0"/>
    </linearGradient>

    <linearGradient id="glass" x1="171" y1="184" x2="459" y2="517" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.52" stop-color="#101010"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>

    <radialGradient id="lensGloss" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(306 266) rotate(48) scale(98)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="88" y="60" width="845" height="875" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>

    <filter id="lensShadow" x="125" y="160" width="360" height="385" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#FFFFFF"/>

  <g filter="url(#softShadow)">
    <path
      d="M140 699V297A190 190 0 0 1 330 107H692A190 190 0 0 1 882 297V575"
      stroke="url(#navy)"
      stroke-width="54"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M114 698H908V719C908 824 823 909 718 909H304C199 909 114 824 114 719V698Z"
      fill="url(#navy)"
    />

    <rect x="252" y="524" width="142" height="125" rx="16" fill="url(#bar1)"/>
    <rect x="444" y="423" width="149" height="226" rx="16" fill="url(#bar2)"/>
    <rect x="644" y="313" width="153" height="336" rx="17" fill="url(#bar3)"/>

    <rect x="197" y="746" width="255" height="29" rx="14.5" fill="#FFFFFF"/>
    <rect x="197" y="813" width="255" height="29" rx="14.5" fill="#FFFFFF"/>

    <g filter="url(#lensShadow)">
      <line x1="250" y1="389" x2="171" y2="481" stroke="url(#glass)" stroke-width="39" stroke-linecap="round"/>
      <circle cx="334" cy="304" r="108" stroke="url(#glass)" stroke-width="34" fill="none"/>
      <path d="M275 269C285 250 302 236 323 230" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" opacity="0.72"/>
      <circle cx="334" cy="304" r="90" fill="url(#lensGloss)"/>
    </g>
  </g>
</svg>
